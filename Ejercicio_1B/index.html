<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Ejercicio 1B - Finisterre</title>

  <style>
    html,
    body,
    #viewDiv {
      padding: 0;
      margin: 0;
      height: 100%;
      width: 100%;
    }
  </style>

  <!-- ArcGIS Maps SDK for JavaScript -->
  <link rel="stylesheet" href="https://js.arcgis.com/4.27/esri/themes/light/main.css">
  <script src="https://js.arcgis.com/4.27/"></script>

  <script>
    require([
      "esri/Map",
      "esri/views/MapView"
    ], function(Map, MapView) {

      // Crear el mapa con basemap satelital
      var map = new Map({
        basemap: "satellite"
      });

      // Crear la vista centrada en Finisterre
      var view = new MapView({
        container: "viewDiv",
        map: map,
        center: [-9.27, 42.88], // Finisterre (A Coruña)
        zoom: 14
      });

    });
  </script>
</head>

<body>
  <div id="viewDiv"></div>
</body>
</html>
