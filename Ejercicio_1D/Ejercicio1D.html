<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Escenas 3D</title>

  <link rel="stylesheet" href="https://js.arcgis.com/4.27/esri/themes/light/main.css">
  <script src="https://js.arcgis.com/4.27/"></script>

  <style>
    html, body, #viewDiv {
      padding: 0;
      margin: 0;
      height: 100%;
      width: 100%;
    }
  </style>
</head>

<body>
  <div id="viewDiv"></div>

<script>
require([
  "esri/Map",
  "esri/views/SceneView",
  "esri/layers/SceneLayer"
], function(Map, SceneView, SceneLayer) {

  // 🌍 Crear mapa 3D
  var map = new Map({
    basemap: "streets",
    ground: "world-elevation"
  });

  // 🎥 Crear vista 3D
  var view = new SceneView({
    container: "viewDiv",
    map: map,
    camera: {
      position: [9.993682, 53.53, 2408],
      tilt: 50
    }
  });

  // ☀️ Ajustar entorno
  view.environment = {
    lighting: {
      directShadowsEnabled: true,
      date: new Date("Sun Mar 15 2023 18:00:00 GMT+0100 (CET)")
    }
  };

  // 🏙️ PASO 4 – Añadir SceneLayer
  var buildingsLayer = new SceneLayer({
    portalItem: {
      id: "ca0470dbbddb4db28bad74ed39949e25"
    }
  });

  map.add(buildingsLayer);

});
</script>

</body>
</html>
