<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Oficinas Esri España</title>
  <style>
    html,
    body,
    #viewDiv {
      padding: 0;
      margin: 0;
      height: 100%;
      width: 100%;
    }
  </style>

  <link rel="stylesheet" href="https://js.arcgis.com/4.27/esri/themes/light/main.css">
  <script src="https://js.arcgis.com/4.27/"></script>

<script>
    // Carga de módulos necesarios para la aplicación: Map y MapView
    require([
      "esri/Map",
      "esri/views/MapView"
    ], function(Map, MapView) {

      // PASO 1: Construimos el objeto mapa y asignamos el mapa base
      var map = new Map({
        basemap: "topo-vector"
      });

      // PASO 2: Construimos la vista, centramos el mapa y definimos el zoom
      var view = new MapView({
        container: "viewDiv",
        map: map,
        center: [-3.69, 40.45], // Longitud, Latitud (Oficina Esri España)
        zoom: 15
      });

    });
  </script>
</head>

<body>
  <div id="viewDiv"></div>
</body>
</html>
