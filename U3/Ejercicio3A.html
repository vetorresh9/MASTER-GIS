<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Selección por geometría</title>

<style>
html, body, #viewDiv {
  padding: 0;
  margin: 0;
  height: 100%;
  width: 100%;
}
</style>

<link rel="stylesheet" href="https://js.arcgis.com/4.27/esri/themes/light/main.css"/>
<script src="https://js.arcgis.com/4.27/"></script>

<script>
require([
  "esri/Map",
  "esri/views/MapView",
  "esri/layers/FeatureLayer",
  "esri/layers/GraphicsLayer",
  "esri/Graphic"
], function (Map, MapView, FeatureLayer, GraphicsLayer, Graphic) {

  var resultsLayer = new GraphicsLayer();

  var map = new Map({
    basemap: "streets",
    layers: [resultsLayer]
  });

  var view = new MapView({
    container: "viewDiv",
    map: map,
    zoom: 4,
    center: [-90, 38]
  });

  var featureLayer = new FeatureLayer({
    url: "https://services.arcgis.com/V6ZHFr6zdgNZuVG0/ArcGIS/rest/services/national_park_service/FeatureServer",
    visible: false
  });

  map.add(featureLayer);

  // ================================
  // PASO 1: Geometría
  // ================================

  var polygon = {
    type: "polygon",
    spatialReference: { wkid: 4326 },
    rings: [
      [-99.55, 45.0],
      [-78.0, 45.0],
      [-78.0, 30.0],
      [-99.55, 30.0],
      [-99.55, 45.0]
    ]
  };

  // ================================
  // PASO 2: Simbología del polígono
  // ================================

  var symbol = {
    type: "simple-fill",
    color: [0, 0, 255, 0.3],
    outline: {
      color: [0, 0, 255],
      width: 2
    }
  };

  var polygonGraphic = new Graphic({
    geometry: polygon,
    symbol: symbol
  });

  resultsLayer.add(polygonGraphic);

  // ================================
  // PASO 3: Definir la consulta
  // ================================

  var query = {
    geometry: polygon,
    spatialRelationship: "intersects",
    returnGeometry: true,
    outFields: ["*"]
  };

  // ================================
  // PASO 4: Ejecutar la consulta
  // ================================

  featureLayer
    .queryFeatures(query)
    .then(function (results) {
      displayResults(results);
    })
    .catch(function (error) {
      console.log(error);
    });

  function displayResults(results) {

    var features = results.features.map(function (graphic) {

      graphic.symbol = {
        type: "simple-marker",
        style: "diamond",
        size: 12,
        color: "red"
      };

      return graphic;
    });

    resultsLayer.addMany(features);
  }

});
</script>
</head>

<body>
<div id="viewDiv"></div>
</body>
</html>
