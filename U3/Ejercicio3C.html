<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Test Fuego</title>

  <link rel="stylesheet" href="https://js.arcgis.com/4.27/esri/themes/dark/main.css" />
  <script src="https://js.arcgis.com/4.27/"></script>

  <style>
    html, body, #viewDiv {
      padding: 0;
      margin: 0;
      height: 100%;
      width: 100%;
    }
  </style>
</head>

<body>
  <div id="viewDiv"></div>

  <script>
    require([
      "esri/Map",
      "esri/views/MapView",
      "esri/Graphic",
      "esri/layers/GraphicsLayer"
    ], function(Map, MapView, Graphic, GraphicsLayer) {

      var map = new Map({
        basemap: "hybrid"
      });

      var view = new MapView({
        container: "viewDiv",
        map: map,
        center: [-3.7, 40.4], // Madrid
        zoom: 6
      });

      var graphicsLayer = new GraphicsLayer();
      map.add(graphicsLayer);

      var puntoMadrid = {
        type: "point",
        longitude: -3.7,
        latitude: 40.4
      };

      var simboloFuego = {
        type: "picture-marker",
        url: "https://cdn-icons-png.flaticon.com/512/1172/1172477.png",
        width: "40px",
        height: "40px"
      };

      var graphic = new Graphic({
        geometry: puntoMadrid,
        symbol: simboloFuego
      });

      graphicsLayer.add(graphic);

    });
  </script>
</body>
</html>
