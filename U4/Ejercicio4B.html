<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Unique Values Renderer</title>

  <link rel="stylesheet" href="https://js.arcgis.com/4.27/esri/themes/light/main.css">
  <script src="https://js.arcgis.com/4.27/"></script>

  <style>
    html,
    body,
    #viewDiv {
      padding: 0;
      margin: 0;
      height: 100%;
      width: 100%;
    }

    .esri-legend {
      background-color: black;
      color: white;
      opacity: 0.85;
    }
  </style>

  <script>
    require([
        "esri/Map",
        "esri/views/MapView",
        "esri/layers/FeatureLayer",
        "esri/renderers/UniqueValueRenderer"
      ],
      function(
        Map, MapView, FeatureLayer, UniqueValueRenderer
      ) {

        // Paso 1: Crear el renderizador

        var farmsRenderer = new UniqueValueRenderer({
          field: "PARCEL_TYP",
          defaultSymbol: {
            type: "simple-fill"
          }
        });

        // Paso 2: Añadir los valores al renderizador

        farmsRenderer.addUniqueValueInfo({
          value: "NON-SEVER EXCEPTION",
          symbol: {
            type: "simple-fill",
            color: "green"
          }
        });

        farmsRenderer.addUniqueValueInfo({
          value: "PARCEL",
          symbol: {
            type: "simple-fill",
            color: "yellow"
          }
        });

        farmsRenderer.addUniqueValueInfo({
          value: "SEVERABLE EXCEPTION",
          symbol: {
            type: "simple-fill",
            color: "blue"
          }
        });

        // Paso 3: Añadir el renderizador a la capa

        var farmsLayer = new FeatureLayer({
          url: "https://services.arcgis.com/V6ZHFr6zdgNZuVG0/ArcGIS/rest/services/NJ_Farmland_Preservation_Areas/FeatureServer/0",
          renderer: farmsRenderer, // Se aplica la renderización a la feature layer
          minScale: 0,
          maxScale: 0,
        });

        // Se crea el mapa, la vista y se inserta la feature layer al mapa.

        var map = new Map({
          basemap: "streets",
          layers: [farmsLayer]
        });

        var view = new MapView({
          container: "viewDiv",
          map: map,
          center: [-74.673730, 40.150360],
          zoom: 13
        });

      });
  </script>
</head>

<body>
  <div id="viewDiv"></div>
</body>

</html>
